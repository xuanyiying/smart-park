syntax = "proto3";

package api.billing.v1;

option go_package = "github.com/xuanyiying/smart-park/api/billing/v1;v1";

import "google/api/annotations.proto";

service BillingService {
  rpc CalculateFee (CalculateFeeRequest) returns (CalculateFeeResponse) {
    option (google.api.http) = {
      post: "/api/v1/billing/calculate"
      body: "*"
    };
  }

  rpc CreateBillingRule (CreateBillingRuleRequest) returns (CreateBillingRuleResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/billing/rules"
      body: "*"
    };
  }

  rpc UpdateBillingRule (UpdateBillingRuleRequest) returns (UpdateBillingRuleResponse) {
    option (google.api.http) = {
      put: "/api/v1/admin/billing/rules/{id}"
      body: "*"
    };
  }

  rpc DeleteBillingRule (DeleteBillingRuleRequest) returns (DeleteBillingRuleResponse) {
    option (google.api.http) = {
      delete: "/api/v1/admin/billing/rules/{id}"
    };
  }

  rpc GetBillingRules (GetBillingRulesRequest) returns (GetBillingRulesResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/billing/rules"
    };
  }

  rpc AdjustPrice (AdjustPriceRequest) returns (AdjustPriceResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/billing/adjust-price"
      body: "*"
    };
  }
}

message CalculateFeeRequest {
  string recordId = 1;
  string lotId = 2;
  string plateNumber = 3;
  int64 entryTime = 4;
  int64 exitTime = 5;
  string vehicleType = 6;
  string membershipLevel = 7;
}

message CalculateFeeResponse {
  int32 code = 1;
  string message = 2;
  BillData data = 3;
}

message BillData {
  string recordId = 1;
  double baseAmount = 2;
  double discountAmount = 3;
  double finalAmount = 4;
  repeated AppliedRule appliedRules = 5;
}

message AppliedRule {
  string ruleId = 1;
  string ruleName = 2;
  double amount = 3;
}

message CreateBillingRuleRequest {
  string lotId = 1;
  string ruleName = 2;
  string ruleType = 3;
  string conditionsJson = 4;
  string actionsJson = 5;
  int32 priority = 6;
  bool isActive = 7;
}

message CreateBillingRuleResponse {
  int32 code = 1;
  string message = 2;
  BillingRule data = 3;
}

message UpdateBillingRuleRequest {
  string id = 1;
  string ruleName = 2;
  string ruleType = 3;
  string conditionsJson = 4;
  string actionsJson = 5;
  int32 priority = 6;
  bool isActive = 7;
}

message UpdateBillingRuleResponse {
  int32 code = 1;
  string message = 2;
}

message DeleteBillingRuleRequest {
  string id = 1;
}

message DeleteBillingRuleResponse {
  int32 code = 1;
  string message = 2;
}

message GetBillingRulesRequest {
  string lotId = 1;
}

message GetBillingRulesResponse {
  int32 code = 1;
  string message = 2;
  repeated BillingRule data = 3;
}

message BillingRule {
  string id = 1;
  string lotId = 2;
  string ruleName = 3;
  string ruleType = 4;
  string conditionsJson = 5;
  string actionsJson = 6;
  int32 priority = 7;
  bool isActive = 8;
  string createdAt = 9;
}

message AdjustPriceRequest {
  string lotId = 1;
  string ruleId = 2;
  string priceAdjustmentJson = 3;
  string reason = 4;
}

message AdjustPriceResponse {
  int32 code = 1;
  string message = 2;
  bool success = 3;
}
