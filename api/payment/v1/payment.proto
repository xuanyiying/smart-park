syntax = "proto3";

package api.payment.v1;

import "google/api/annotations.proto";

option go_package = "github.com/xuanyiying/smart-park/api/payment/v1;v1";

service PaymentService {
  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse) {
    option (google.api.http) = {
      post: "/api/v1/pay/create",
      body: "*",
    };
  }

  rpc GetPaymentStatus(GetPaymentStatusRequest) returns (GetPaymentStatusResponse) {
    option (google.api.http) = {
      get: "/api/v1/pay/{orderId}/status",
    };
  }

  rpc WechatCallback(WechatCallbackRequest) returns (WechatCallbackResponse) {
    option (google.api.http) = {
      post: "/api/v1/pay/callback/wechat",
      body: "*",
    };
  }

  rpc AlipayCallback(AlipayCallbackRequest) returns (AlipayCallbackResponse) {
    option (google.api.http) = {
      post: "/api/v1/pay/callback/alipay",
      body: "*",
    };
  }

  rpc Refund(RefundRequest) returns (RefundResponse) {
    option (google.api.http) = {
      post: "/api/v1/pay/{orderId}/refund",
      body: "*",
    };
  }

  rpc ReconcileDaily(ReconcileDailyRequest) returns (ReconcileDailyResponse) {
    option (google.api.http) = {
      post: "/api/v1/pay/reconcile/daily",
      body: "*",
    };
  }

  rpc GetReconciliationReport(GetReconciliationReportRequest) returns (GetReconciliationReportResponse) {
    option (google.api.http) = {
      get: "/api/v1/pay/reconcile/report",
    };
  }

  rpc FixMismatchedOrders(FixMismatchedOrdersRequest) returns (FixMismatchedOrdersResponse) {
    option (google.api.http) = {
      post: "/api/v1/pay/reconcile/fix",
      body: "*",
    };
  }
}

message CreatePaymentRequest {
  string recordId  = 1;
  double amount    = 2;
  string payMethod = 3;
  string openId    = 4;
  string notifyUrl = 5;
}

message CreatePaymentResponse {
  int32       code    = 1;
  string      message = 2;
  PaymentData data    = 3;
}

message PaymentData {
  string orderId    = 1;
  double amount     = 2;
  string payUrl     = 3;
  string qrCode     = 4;
  string expireTime = 5;
}

message GetPaymentStatusRequest {
  string orderId = 1;
}

message GetPaymentStatusResponse {
  int32             code    = 1;
  string            message = 2;
  PaymentStatusData data    = 3;
}

message PaymentStatusData {
  string orderId   = 1;
  string status    = 2;
  string payTime   = 3;
  string payMethod = 4;
}

message WechatCallbackRequest {
  string returnCode    = 1;
  string returnMsg     = 2;
  string resultCode    = 3;
  string transactionId = 4;
  string outTradeNo    = 5;
  string totalFee      = 6;
  string timeEnd       = 7;
  string sign          = 8;
}

message WechatCallbackResponse {
  string returnCode = 1;
  string returnMsg  = 2;
}

message AlipayCallbackRequest {
  string tradeStatus = 1;
  string tradeNo     = 2;
  string outTradeNo  = 3;
  string totalAmount = 4;
  string gmtPayment  = 5;
  string sign        = 6;
}

message AlipayCallbackResponse {
  string code = 1;
  string msg  = 2;
}

message RefundRequest {
  string orderId = 1;
  string reason  = 2;
}

message RefundResponse {
  int32      code    = 1;
  string     message = 2;
  RefundData data    = 3;
}

message RefundData {
  string refundId = 1;
  string status   = 2;
}

message ReconcileDailyRequest {
  string date = 1; // 格式：2006-01-02
}

message ReconcileDailyResponse {
  int32                   code    = 1;
  string                  message = 2;
  repeated ReconciliationRecord data    = 3;
}

message ReconciliationRecord {
  string id                = 1;
  string orderId           = 2;
  string paymentMethod     = 3;
  double orderAmount       = 4;
  double paidAmount        = 5;
  string transactionId     = 6;
  string reconciliationTime = 7;
  string status            = 8;
  string notes             = 9;
}

message GetReconciliationReportRequest {
  string startDate = 1; // 格式：2006-01-02
  string endDate   = 2; // 格式：2006-01-02
}

message GetReconciliationReportResponse {
  int32  code    = 1;
  string message = 2;
  map<string, string> data    = 3;
}

message FixMismatchedOrdersRequest {
  repeated string orderIds = 1;
}

message FixMismatchedOrdersResponse {
  int32  code    = 1;
  string message = 2;
}
