syntax = "proto3";

package api.charging.v1;

import "google/api/annotations.proto";

option go_package = "github.com/xuanyiying/smart-park/api/charging/v1;v1";

service ChargingService {
  // Station management
  rpc CreateStation(CreateStationRequest) returns (CreateStationResponse) {
    option (google.api.http) = {
      post: "/api/v1/charging/stations",
      body: "*",
    };
  }

  rpc GetStation(GetStationRequest) returns (GetStationResponse) {
    option (google.api.http) = {
      get: "/api/v1/charging/stations/{stationId}",
    };
  }

  rpc UpdateStation(UpdateStationRequest) returns (UpdateStationResponse) {
    option (google.api.http) = {
      put:  "/api/v1/charging/stations/{stationId}",
      body: "*",
    };
  }

  rpc DeleteStation(DeleteStationRequest) returns (DeleteStationResponse) {
    option (google.api.http) = {
      delete: "/api/v1/charging/stations/{stationId}",
    };
  }

  rpc ListStations(ListStationsRequest) returns (ListStationsResponse) {
    option (google.api.http) = {
      get: "/api/v1/charging/stations",
    };
  }

  rpc GetAvailableStations(GetAvailableStationsRequest) returns (GetAvailableStationsResponse) {
    option (google.api.http) = {
      get: "/api/v1/charging/stations/available",
    };
  }

  // Connector management
  rpc CreateConnector(CreateConnectorRequest) returns (CreateConnectorResponse) {
    option (google.api.http) = {
      post: "/api/v1/charging/connectors",
      body: "*",
    };
  }

  rpc GetConnector(GetConnectorRequest) returns (GetConnectorResponse) {
    option (google.api.http) = {
      get: "/api/v1/charging/connectors/{connectorId}",
    };
  }

  rpc ListConnectors(ListConnectorsRequest) returns (ListConnectorsResponse) {
    option (google.api.http) = {
      get: "/api/v1/charging/stations/{stationId}/connectors",
    };
  }

  // Charging session
  rpc StartCharging(StartChargingRequest) returns (StartChargingResponse) {
    option (google.api.http) = {
      post: "/api/v1/charging/sessions/start",
      body: "*",
    };
  }

  rpc StopCharging(StopChargingRequest) returns (StopChargingResponse) {
    option (google.api.http) = {
      post: "/api/v1/charging/sessions/{sessionId}/stop",
      body: "*",
    };
  }

  rpc GetSession(GetSessionRequest) returns (GetSessionResponse) {
    option (google.api.http) = {
      get: "/api/v1/charging/sessions/{sessionId}",
    };
  }

  rpc ListUserSessions(ListUserSessionsRequest) returns (ListUserSessionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/charging/sessions",
    };
  }

  rpc GetChargingSummary(GetChargingSummaryRequest) returns (GetChargingSummaryResponse) {
    option (google.api.http) = {
      get: "/api/v1/charging/sessions/{sessionId}/summary",
    };
  }

  // Price management
  rpc CreatePrice(CreatePriceRequest) returns (CreatePriceResponse) {
    option (google.api.http) = {
      post: "/api/v1/charging/prices",
      body: "*",
    };
  }

  rpc GetCurrentPrice(GetCurrentPriceRequest) returns (GetCurrentPriceResponse) {
    option (google.api.http) = {
      get: "/api/v1/charging/stations/{stationId}/price",
    };
  }

  rpc ListPrices(ListPricesRequest) returns (ListPricesResponse) {
    option (google.api.http) = {
      get: "/api/v1/charging/stations/{stationId}/prices",
    };
  }

  // Payment
  rpc ConfirmPayment(ConfirmPaymentRequest) returns (ConfirmPaymentResponse) {
    option (google.api.http) = {
      post: "/api/v1/charging/sessions/{sessionId}/payment/confirm",
      body: "*",
    };
  }
}

// Station messages
message CreateStationRequest {
  string lotId           = 1;
  string name            = 2;
  string stationType     = 3; // ac, dc, fast_dc
  string connectorType   = 4;
  double maxPower        = 5;
  double voltage         = 6;
  int32  totalConnectors = 7;
  string location        = 8;
  string floor           = 9;
}

message CreateStationResponse {
  int32   code    = 1;
  string  message = 2;
  Station data    = 3;
}

message GetStationRequest {
  string stationId = 1;
}

message GetStationResponse {
  int32   code    = 1;
  string  message = 2;
  Station data    = 3;
}

message UpdateStationRequest {
  string stationId       = 1;
  string name            = 2;
  string status          = 3; // available, offline, maintenance
  double maxPower        = 4;
  int32  totalConnectors = 5;
  string location        = 6;
  string floor           = 7;
}

message UpdateStationResponse {
  int32   code    = 1;
  string  message = 2;
  Station data    = 3;
}

message DeleteStationRequest {
  string stationId = 1;
}

message DeleteStationResponse {
  int32  code    = 1;
  string message = 2;
}

message ListStationsRequest {
  string lotId    = 1;
  int32  page     = 2;
  int32  pageSize = 3;
}

message ListStationsResponse {
  int32            code    = 1;
  string           message = 2;
  repeated Station data    = 3;
  int64            total   = 4;
}

message GetAvailableStationsRequest {
  string lotId = 1;
}

message GetAvailableStationsResponse {
  int32            code    = 1;
  string           message = 2;
  repeated Station data    = 3;
}

message Station {
  string id                  = 1;
  string lotId               = 2;
  string name                = 3;
  string stationType         = 4;
  string status              = 5;
  string connectorType       = 6;
  double maxPower            = 7;
  double voltage             = 8;
  int32  totalConnectors     = 9;
  int32  availableConnectors = 10;
  string location            = 11;
  string floor               = 12;
  string createdAt           = 13;
  string updatedAt           = 14;
}

// Connector messages
message CreateConnectorRequest {
  string stationId = 1;
  int32  number    = 2;
  string type      = 3; // ac, dc, fast_dc
  double maxPower  = 4;
  double voltage   = 5;
}

message CreateConnectorResponse {
  int32     code    = 1;
  string    message = 2;
  Connector data    = 3;
}

message GetConnectorRequest {
  string connectorId = 1;
}

message GetConnectorResponse {
  int32     code    = 1;
  string    message = 2;
  Connector data    = 3;
}

message ListConnectorsRequest {
  string stationId = 1;
}

message ListConnectorsResponse {
  int32              code    = 1;
  string             message = 2;
  repeated Connector data    = 3;
}

message Connector {
  string id        = 1;
  string stationId = 2;
  int32  number    = 3;
  string type      = 4;
  string status    = 5; // available, charging, faulted, offline
  double maxPower  = 6;
  double voltage   = 7;
  double current   = 8;
  string faultCode = 9;
  string createdAt = 10;
  string updatedAt = 11;
}

// Session messages
message StartChargingRequest {
  string stationId    = 1;
  string connectorId  = 2;
  string userId       = 3;
  string vehiclePlate = 4;
}

message StartChargingResponse {
  int32   code    = 1;
  string  message = 2;
  Session data    = 3;
}

message StopChargingRequest {
  string sessionId = 1;
  string userId    = 2;
}

message StopChargingResponse {
  int32   code    = 1;
  string  message = 2;
  Session data    = 3;
}

message GetSessionRequest {
  string sessionId = 1;
}

message GetSessionResponse {
  int32   code    = 1;
  string  message = 2;
  Session data    = 3;
}

message ListUserSessionsRequest {
  string userId   = 1;
  int32  page     = 2;
  int32  pageSize = 3;
}

message ListUserSessionsResponse {
  int32            code    = 1;
  string           message = 2;
  repeated Session data    = 3;
  int64            total   = 4;
}

message GetChargingSummaryRequest {
  string sessionId = 1;
}

message GetChargingSummaryResponse {
  int32           code    = 1;
  string          message = 2;
  ChargingSummary data    = 3;
}

message Session {
  string id            = 1;
  string stationId     = 2;
  string connectorId   = 3;
  string userId        = 4;
  string vehiclePlate  = 5;
  string startTime     = 6;
  string endTime       = 7;
  double startEnergy   = 8;
  double endEnergy     = 9;
  double chargedEnergy = 10;
  double cost          = 11;
  double serviceFee    = 12;
  double totalAmount   = 13;
  string status        = 14; // pending, charging, completed, cancelled, expired
  string paymentStatus = 15; // pending, paid, refunded, failed
  string payTime       = 16;
  string paymentMethod = 17;
  string transactionId = 18;
  string createdAt     = 19;
  string updatedAt     = 20;
}

message ChargingSummary {
  string sessionId     = 1;
  string stationName   = 2;
  int32  connectorNum  = 3;
  string vehiclePlate  = 4;
  string startTime     = 5;
  string endTime       = 6;
  double duration      = 7; // hours
  double chargedEnergy = 8;
  double cost          = 9;
  double serviceFee    = 10;
  double totalAmount   = 11;
  string paymentStatus = 12;
}

// Price messages
message CreatePriceRequest {
  string stationId   = 1;
  string name        = 2;
  int32  startHour   = 3;
  int32  endHour     = 4;
  double pricePerKwh = 5;
  double serviceFee  = 6;
  double peakLoad    = 7;
  double offPeakLoad = 8;
  bool   isPeakHours = 9;
  string effectiveAt = 10;
  string expiresAt   = 11;
}

message CreatePriceResponse {
  int32  code    = 1;
  string message = 2;
  Price  data    = 3;
}

message GetCurrentPriceRequest {
  string stationId = 1;
}

message GetCurrentPriceResponse {
  int32  code    = 1;
  string message = 2;
  Price  data    = 3;
}

message ListPricesRequest {
  string stationId = 1;
}

message ListPricesResponse {
  int32          code    = 1;
  string         message = 2;
  repeated Price data    = 3;
}

message Price {
  string id          = 1;
  string stationId   = 2;
  string name        = 3;
  int32  startHour   = 4;
  int32  endHour     = 5;
  double pricePerKwh = 6;
  double serviceFee  = 7;
  double peakLoad    = 8;
  double offPeakLoad = 9;
  bool   isPeakHours = 10;
  string effectiveAt = 11;
  string expiresAt   = 12;
  string createdAt   = 13;
  string updatedAt   = 14;
}

// Payment messages
message ConfirmPaymentRequest {
  string sessionId     = 1;
  string transactionId = 2;
  string paymentMethod = 3;
  double paidAmount    = 4;
}

message ConfirmPaymentResponse {
  int32   code    = 1;
  string  message = 2;
  Session data    = 3;
}
