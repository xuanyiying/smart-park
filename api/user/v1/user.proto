syntax = "proto3";

package api.user.v1;

option go_package = "github.com/xuanyiying/smart-park/api/user/v1;v1";

import "google/api/annotations.proto";

service UserService {
  rpc Login (LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/api/v1/user/login"
      body: "*"
    };
  }

  rpc GetUserInfo (GetUserInfoRequest) returns (GetUserInfoResponse) {
    option (google.api.http) = {
      get: "/api/v1/user/info"
    };
  }

  rpc BindPlate (BindPlateRequest) returns (BindPlateResponse) {
    option (google.api.http) = {
      post: "/api/v1/user/plates"
      body: "*"
    };
  }

  rpc UnbindPlate (UnbindPlateRequest) returns (UnbindPlateResponse) {
    option (google.api.http) = {
      delete: "/api/v1/user/plates/{plateNumber}"
    };
  }

  rpc ListPlates (ListPlatesRequest) returns (ListPlatesResponse) {
    option (google.api.http) = {
      get: "/api/v1/user/plates"
    };
  }

  rpc ListParkingRecords (ListParkingRecordsRequest) returns (ListParkingRecordsResponse) {
    option (google.api.http) = {
      get: "/api/v1/user/parking-records"
    };
  }

  rpc GetParkingRecord (GetParkingRecordRequest) returns (GetParkingRecordResponse) {
    option (google.api.http) = {
      get: "/api/v1/user/parking-records/{recordId}"
    };
  }

  rpc ScanPay (ScanPayRequest) returns (ScanPayResponse) {
    option (google.api.http) = {
      post: "/api/v1/user/scan-pay"
      body: "*"
    };
  }

  rpc GetMonthlyCard (GetMonthlyCardRequest) returns (GetMonthlyCardResponse) {
    option (google.api.http) = {
      get: "/api/v1/user/monthly-card/{plateNumber}"
    };
  }

  rpc PurchaseMonthlyCard (PurchaseMonthlyCardRequest) returns (PurchaseMonthlyCardResponse) {
    option (google.api.http) = {
      post: "/api/v1/user/monthly-card"
      body: "*"
    };
  }

  rpc UpdateAutoPaySettings (UpdateAutoPaySettingsRequest) returns (UpdateAutoPaySettingsResponse) {
    option (google.api.http) = {
      put: "/api/v1/user/auto-pay"
      body: "*"
    };
  }

  rpc GetCreditInfo (GetCreditInfoRequest) returns (GetCreditInfoResponse) {
    option (google.api.http) = {
      get: "/api/v1/user/credit"
    };
  }
}

message UpdateAutoPaySettingsRequest {
  bool autoPayEnabled = 1;
  string defaultPayMethod = 2;
}

message UpdateAutoPaySettingsResponse {
  int32 code = 1;
  string message = 2;
  bool success = 3;
}

message GetCreditInfoRequest {}

message GetCreditInfoResponse {
  int32 code = 1;
  string message = 2;
  CreditInfo data = 3;
}

message CreditInfo {
  int32 creditScore = 1;
  string creditLevel = 2;
  string creditStatus = 3;
  string eligibleForPostPayment = 4;
}

message LoginRequest {
  string code = 1;
}

message LoginResponse {
  int32 code = 1;
  string message = 2;
  LoginData data = 3;
}

message LoginData {
  string token = 1;
  string openId = 2;
  int64 expiresAt = 3;
}

message GetUserInfoRequest {}

message GetUserInfoResponse {
  int32 code = 1;
  string message = 2;
  UserInfo data = 3;
}

message UserInfo {
  string userId = 1;
  string openId = 2;
  string nickname = 3;
  string avatar = 4;
  string phone = 5;
  int32 creditScore = 6;
  string creditLevel = 7;
  string defaultPayMethod = 8;
  bool autoPayEnabled = 9;
  int64 createdAt = 10;
}

message BindPlateRequest {
  string plateNumber = 1;
  string ownerName = 2;
  string ownerPhone = 3;
}

message BindPlateResponse {
  int32 code = 1;
  string message = 2;
}

message UnbindPlateRequest {
  string plateNumber = 1;
}

message UnbindPlateResponse {
  int32 code = 1;
  string message = 2;
}

message ListPlatesRequest {
  int32 page = 1;
  int32 pageSize = 2;
}

message ListPlatesResponse {
  int32 code = 1;
  string message = 2;
  ListPlatesData data = 3;
}

message ListPlatesData {
  repeated PlateInfo plates = 1;
  int32 total = 2;
}

message PlateInfo {
  string plateNumber = 1;
  string vehicleType = 2;
  string ownerName = 3;
  string ownerPhone = 4;
  string monthlyValidUntil = 5;
}

message ListParkingRecordsRequest {
  string plateNumber = 1;
  int32 page = 2;
  int32 pageSize = 3;
}

message ListParkingRecordsResponse {
  int32 code = 1;
  string message = 2;
  ListParkingRecordsData data = 3;
}

message ListParkingRecordsData {
  repeated ParkingRecordInfo records = 1;
  int32 total = 2;
}

message ParkingRecordInfo {
  string recordId = 1;
  string plateNumber = 2;
  string lotName = 3;
  string entryTime = 4;
  string exitTime = 5;
  int32 duration = 6;
  double amount = 7;
  string status = 8;
}

message GetParkingRecordRequest {
  string recordId = 1;
}

message GetParkingRecordResponse {
  int32 code = 1;
  string message = 2;
  ParkingRecordInfo data = 3;
}

message ScanPayRequest {
  string recordId = 1;
  string payMethod = 2;
  string openId = 3;
}

message ScanPayResponse {
  int32 code = 1;
  string message = 2;
  ScanPayData data = 3;
}

message ScanPayData {
  string orderId = 1;
  double amount = 2;
  string payUrl = 3;
  string qrCode = 4;
  string expireTime = 5;
}

message GetMonthlyCardRequest {
  string plateNumber = 1;
}

message GetMonthlyCardResponse {
  int32 code = 1;
  string message = 2;
  MonthlyCardInfo data = 3;
}

message MonthlyCardInfo {
  string plateNumber = 1;
  string validUntil = 2;
  int32 daysRemaining = 3;
  bool isValid = 4;
}

message PurchaseMonthlyCardRequest {
  string plateNumber = 1;
  int32 months = 2;
  string payMethod = 3;
  string openId = 4;
}

message PurchaseMonthlyCardResponse {
  int32 code = 1;
  string message = 2;
  PurchaseMonthlyCardData data = 3;
}

message PurchaseMonthlyCardData {
  string orderId = 1;
  double amount = 2;
  string payUrl = 3;
  string qrCode = 4;
}
