server:
  port: 8000
  timeout: 60

routes:
  - path: /api/v1/device
    target: vehicle-svc:8001
  - path: /api/v1/billing
    target: billing-svc:8002
  - path: /api/v1/pay
    target: payment-svc:8003
  - path: /api/v1/admin
    target: admin-svc:8004
  - path: /api/v1/user
    target: user-svc:8005

etcd:
  endpoints:
    - "${ETCD_ENDPOINT:localhost:2379}"
  timeout: 5s

log:
  level: info
  format: json

otel:
  endpoint: "${OTEL_ENDPOINT}"
  serviceName: "gateway-svc"
