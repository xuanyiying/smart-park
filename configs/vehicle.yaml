server:
  port: 8001
  timeout: 60

database:
  driver: postgres
  source: "host=${DB_HOST:localhost} user=${DB_USER:postgres} password=${DB_PASSWORD:} dbname=${DB_NAME:parking} port=${DB_PORT:5432} sslmode=${DB_SSL_MODE:disable}"

redis:
  addr: "${REDIS_ADDR:localhost:6379}"
  password: "${REDIS_PASSWORD:}"
  db: ${REDIS_DB:0}

mq:
  type: "redis"
  redis:
    addr: "${REDIS_ADDR:localhost:6379}"
    password: "${REDIS_PASSWORD:}"
    db: ${REDIS_DB:0}
    stream: "parking"

mqtt:
  broker: "${MQTT_BROKER:tcp://localhost:1883}"
  client_id: "vehicle-service"
  username: "${MQTT_USERNAME:}"
  password: "${MQTT_PASSWORD:}"
  topics:
    command: "parking/device/{device_id}/command"
    status: "parking/device/{device_id}/status"
    heartbeat: "parking/device/{device_id}/heartbeat"

log:
  level: ${LOG_LEVEL:info}
  format: ${LOG_FORMAT:json}

telemetry:
  enabled: ${TELEMETRY_ENABLED:true}
  endpoint: "${OTEL_ENDPOINT:localhost:4317}"
  serviceName: "vehicle-svc"
  sampleRate: ${TRACE_SAMPLE_RATE:1.0}
