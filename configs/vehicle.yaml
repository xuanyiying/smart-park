server:
  port: 8001
  timeout: 60

database:
  driver: postgres
  primary:
    source: "host=localhost user=postgres password=postgres dbname=parking port=5432 sslmode=disable"
  replica:
    source: "host=localhost user=postgres password=postgres dbname=parking port=5432 sslmode=disable"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

mq:
  type: "redis"
  redis:
    addr: "localhost:6379"
    password: ""
    db: 0
    stream: "parking"

mqtt:
  broker: ""
  client_id: "vehicle-service"
  username: ""
  password: ""
  topics:
    command: "parking/device/{device_id}/command"
    status: "parking/device/{device_id}/status"
    heartbeat: "parking/device/{device_id}/heartbeat"

log:
  level: info
  format: json

telemetry:
  enabled: true
  endpoint: "localhost:4317"
  serviceName: "vehicle-svc"
  sampleRate: 1.0
