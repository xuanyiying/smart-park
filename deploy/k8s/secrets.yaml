apiVersion: v1
kind: Secret
metadata:
  name: smart-park-secrets
  namespace: smart-park
type: Opaque
stringData:
  # 数据库密码
  db-password: "postgres"
  
  # JWT 密钥
  jwt-secret: "your-jwt-secret-key-change-in-production"
  
  # 微信支付密钥（Base64 编码）
  wechat-private-key: |
    -----BEGIN PRIVATE KEY-----
    # 替换为实际的微信支付私钥
    -----END PRIVATE KEY-----
  
  # 支付宝密钥（Base64 编码）
  alipay-private-key: |
    -----BEGIN RSA PRIVATE KEY-----
    # 替换为实际的支付宝私钥
    -----END RSA PRIVATE KEY-----
  
  alipay-public-key: |
    -----BEGIN PUBLIC KEY-----
    # 替换为实际的支付宝公钥
    -----END PUBLIC KEY-----
