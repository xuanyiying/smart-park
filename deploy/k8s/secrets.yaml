apiVersion: v1
kind: Secret
metadata:
  name: smart-park-secrets
  namespace: smart-park
type: Opaque
stringData:
  # 数据库密码 - 生产环境请使用 kubectl create secret 命令创建
  # kubectl create secret generic smart-park-secrets --from-literal=db-password=your-password
  db-password: "${DB_PASSWORD}"
  
  # JWT 密钥 - 生产环境请使用强密钥
  # kubectl create secret generic smart-park-secrets --from-literal=jwt-secret=your-jwt-secret
  jwt-secret: "${JWT_SECRET}"
  
  # 微信支付私钥 - 生产环境请使用 kubectl create secret 命令创建
  # kubectl create secret generic smart-park-secrets --from-file=wechat-private-key=./secrets/wechat_private_key.pem
  wechat-private-key: |
    -----BEGIN PRIVATE KEY-----
    # 替换为实际的微信支付私钥
    # 生产环境请勿将私钥提交到代码仓库
    -----END PRIVATE KEY-----
  
  # 支付宝私钥 - 生产环境请使用 kubectl create secret 命令创建
  # kubectl create secret generic smart-park-secrets --from-file=alipay-private-key=./secrets/alipay_private_key.pem
  alipay-private-key: |
    -----BEGIN RSA PRIVATE KEY-----
    # 替换为实际的支付宝私钥
    # 生产环境请勿将私钥提交到代码仓库
    -----END RSA PRIVATE KEY-----
  
  alipay-public-key: |
    -----BEGIN PUBLIC KEY-----
    # 替换为实际的支付宝公钥
    -----END PUBLIC KEY-----

---
# 生产环境部署说明:
# 
# 1. 创建命名空间:
#    kubectl apply -f namespace.yaml
#
# 2. 创建 Secrets (推荐方式):
#    kubectl create secret generic smart-park-secrets \
#      --namespace=smart-park \
#      --from-literal=db-password=<your-db-password> \
#      --from-literal=jwt-secret=<your-jwt-secret> \
#      --from-file=wechat-private-key=<path-to-wechat-key> \
#      --from-file=alipay-private-key=<path-to-alipay-key> \
#      --from-file=alipay-public-key=<path-to-alipay-public-key>
#
# 3. 或者使用 Sealed Secrets / External Secrets Operator 进行更安全的密钥管理
#
# 4. 切勿将此文件提交到版本控制系统！
