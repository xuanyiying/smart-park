apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: smart-park
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
  - name: http
    port: 80
    targetPort: 8000
  - name: grpc
    port: 90
    targetPort: 9000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: gateway-lb
  namespace: smart-park
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
  - name: http
    port: 80
    targetPort: 8000
  type: LoadBalancer

