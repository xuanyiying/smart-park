apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: smart-park
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        istio-injection: enabled
    spec:
      containers:
      - name: gateway
        image: smart-park/gateway:latest
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9000
          name: grpc
        env:
        - name: KRATOS_CONF
          value: "/configs/gateway.yaml"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smart-park-secrets
              key: db-password
        volumeMounts:
        - name: config
          mountPath: /configs
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: smart-park-config
          items:
          - key: gateway.yaml
            path: gateway.yaml

