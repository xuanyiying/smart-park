version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smart-park-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parking}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart-park-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: smart-park-etcd
    environment:
      ETCD_NAME: etcd
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
    ports:
      - "2379:2379"

  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: smart-park-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: smart-park-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:10.2.0
    container_name: smart-park-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: always

  loki:
    image: grafana/loki:2.9.0
    container_name: smart-park-loki
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: always

  promtail:
    image: grafana/promtail:2.9.0
    container_name: smart-park-promtail
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml
      - /var/log:/var/log
    restart: always

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: smart-park-node-exporter
    ports:
      - "9100:9100"
    restart: always

  redis-exporter:
    image: oliver006/redis_exporter:v1.48.0
    container_name: smart-park-redis-exporter
    environment:
      - REDIS_ADDR=redis:6379
    ports:
      - "9121:9121"
    restart: always

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.14.0
    container_name: smart-park-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:postgres@postgres:5432/parking?sslmode=disable
    ports:
      - "9187:9187"
    restart: always

  seata-server:
    image: seataio/seata-server:1.6.1
    container_name: smart-park-seata
    environment:
      - SEATA_IP=seata-server
      - SEATA_PORT=8091
      - STORE_MODE=file
    ports:
      - "8091:8091"
      - "7091:7091"
    volumes:
      - seata_data:/seata-server/data

  gateway:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.gateway
    container_name: smart-park-gateway
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - etcd
    environment:
      - KRATOS_CONF=../../configs/gateway.yaml

  vehicle:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.vehicle
    container_name: smart-park-vehicle
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis
    environment:
      - KRATOS_CONF=../../configs/vehicle.yaml

  billing:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.billing
    container_name: smart-park-billing
    ports:
      - "8002:8002"
    depends_on:
      - postgres
    environment:
      - KRATOS_CONF=../../configs/billing.yaml

  payment:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.payment
    container_name: smart-park-payment
    ports:
      - "8003:8003"
    depends_on:
      - postgres
    environment:
      - KRATOS_CONF=../../configs/payment.yaml

  admin:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.admin
    container_name: smart-park-admin
    ports:
      - "8004:8004"
    depends_on:
      - postgres
    environment:
      - KRATOS_CONF=../../configs/admin.yaml

volumes:
  postgres_data:
  redis_data:
  seata_data:
  prometheus_data:
  grafana_data:
  loki_data:
