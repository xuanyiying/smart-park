global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'smart-park-services'
    static_configs:
      - targets: ['gateway:8000', 'vehicle:8001', 'billing:8002', 'payment:8003', 'admin:8004', 'device:8005', 'analytics:8006']
    metrics_path: '/metrics'
    scrape_interval: 10s