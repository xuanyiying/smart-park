<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1E40AF" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="url(#primaryGradient)" filter="url(#shadow)"/>

  <!-- 停车标志 P -->
  <text x="100" y="125" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle">P</text>

  <!-- 智能元素 - 环绕的弧线 -->
  <path d="M 50 100 A 50 50 0 0 1 150 100" fill="none" stroke="url(#secondaryGradient)" stroke-width="4" stroke-linecap="round"/>
  <path d="M 55 115 A 45 45 0 0 0 145 115" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>

  <!-- 信号点 -->
  <circle cx="100" cy="45" r="6" fill="white"/>
  <circle cx="75" cy="52" r="4" fill="rgba(255,255,255,0.7)"/>
  <circle cx="125" cy="52" r="4" fill="rgba(255,255,255,0.7)"/>

  <!-- 底部装饰线 -->
  <rect x="60" y="140" width="80" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
</svg>
